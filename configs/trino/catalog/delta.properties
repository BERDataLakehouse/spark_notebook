# LOCAL DEVELOPMENT ONLY — shared baseline catalog for docker-compose.
# Uses default MinIO root credentials (minio/minio123) which are only valid
# in the local dev stack. Production notebooks never use this catalog;
# get_trino_connection() creates per-user dynamic catalogs with credentials
# fetched from the governance API.
connector.name=delta_lake
hive.metastore.uri=thrift://hive-metastore:9083

# Native S3 filesystem (Trino 440+)
fs.native-s3.enabled=true
s3.endpoint=http://minio:9002
s3.aws-access-key=minio
s3.aws-secret-key=minio123
s3.path-style-access=true
s3.region=us-east-1

# Delta Lake specific
delta.enable-non-concurrent-writes=true
