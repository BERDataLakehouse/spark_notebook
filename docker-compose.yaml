# Docker Compose configuration for testing BERDL Spark Notebook
# This docker-compose is for developer convenience, not for running in production.
#
# INSTRUCTIONS:
# =============
#
# OPTION A: USING PRE-BUILT IMAGES (RECOMMENDED FOR MOST USERS)
# --------------------------------------------------------------
# If you want to use pre-built images from the registry:
# 1. Uncomment the 'image:' and 'platform:' lines in each service
# 2. Comment out the 'build:' sections
# 3. Run: docker compose up -d
#
# No build steps required!
#
# OPTION B: BUILDING FROM LOCAL SOURCE CODE (FOR DEVELOPERS)
# -----------------------------------------------------------
# If you're developing and want to build from local source:
#
# 1. CLONE REQUIRED REPOSITORIES:
#    You need to clone the following repos from https://github.com/BERDataLakehouse
#    at the same directory level as this spark_notebook directory:
#
#    git clone https://github.com/BERDataLakehouse/spark_notebook_base.git
#    git clone https://github.com/BERDataLakehouse/kube_spark_manager_image.git
#    git clone https://github.com/BERDataLakehouse/hive_metastore.git
#    git clone https://github.com/BERDataLakehouse/datalake-mcp-server.git
#    git clone https://github.com/BERDataLakehouse/minio_manager_service.git
#    git clone https://github.com/BERDataLakehouse/tenant_access_request_service.git
#
#    Your directory structure should look like:
#    parent/
#      ├── spark_notebook/           (this directory)
#      ├── spark_notebook_base/
#      ├── kube_spark_manager_image/
#      ├── hive_metastore/
#      ├── datalake-mcp-server/
#      ├── minio_manager_service/
#      └── tenant_access_request_service/
#
# 2. BUILD REQUIRED BASE IMAGES FIRST:
#    cd ../spark_notebook_base && \
#    docker build -t spark_notebook_base:local .
#
#    cd ../spark_notebook && \
#    docker build \
#      -t spark_notebook:local \
#      --build-arg BASE_TAG=local \
#      --build-arg BASE_REGISTRY="" \
#      .
#
# 3. ENSURE BUILD SECTIONS ARE UNCOMMENTED:
#    The docker-compose.yaml should have 'build:' sections uncommented
#    and 'image:' lines commented out for services you want to build locally.
#
# 4. RUN DOCKER COMPOSE:
#    docker compose up -d --build
#
#    NOTE: Base images must be rebuilt when Dockerfiles or dependencies change.
#
# AUTHENTICATION SETUP (REQUIRED FOR BOTH OPTIONS):
# --------------------------------------------------
# - rename the file `.env.sample` to `.env`
# - update the file with your KBase CI user name and auth token
#
# DEFAULT CREDENTIALS:
# --------------------
# - Ceph S3/IAM: test_access_key / test_access_secret
# - Ceph Dashboard: admin / admin
# - PostgreSQL: hive / hivepassword
services:
  spark-notebook:
    # image: ghcr.io/berdatalakehouse/spark_notebook:main
    # platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_TAG: local
        BASE_REGISTRY: ""
    ports:
      - "8888:8888"  # Jupyter notebook
      - "15002:15002"  # Spark Connect server
    environment:
      # CORE BERDL CONFIGURATION
      - CDM_TASK_SERVICE_URL=http://localhost:8080
      - SPARK_CLUSTER_MANAGER_API_URL=http://localhost:8000
      - SPARK_MASTER_URL=spark://spark-master:7077
      - BERDL_POD_IP=spark-notebook
      - BERDL_HIVE_METASTORE_URI=thrift://hive-metastore:9083

      # MINIO CONFIGURATION
      - MINIO_ENDPOINT_URL=ceph:8080

      # DATA GOVERNANCE CONFIGURATION
      - GOVERNANCE_API_URL=http://minio-manager-service:8000
      - TENANT_ACCESS_SERVICE_URL=http://tenant-access-request-service:8000

      # DATALAKE MCP SERVER CONFIGURATION
      - DATALAKE_MCP_SERVER_URL=http://datalake-mcp-server:8000/apis/mcp

      # TRINO CONFIGURATION
      - TRINO_HOST=trino
      - TRINO_PORT=8080

      # AUTHENTICATION CONFIGURATION
      - KBASE_AUTH_URL=https://ci.kbase.us/services/auth/
      - KBASE_AUTH_TOKEN=${CI_KBASE_AUTH_TOKEN}
      - NB_USER=${CI_KBASE_USERNAME}
    volumes:
      - users_home:/home
      - global_share:/home/${CI_KBASE_USERNAME}/global_share
    depends_on:
      spark-master:
        condition: service_started
      ceph-create-buckets:
        condition: service_completed_successfully
      minio-manager-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      hive-metastore:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8888/api')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    command: start-notebook.py --NotebookApp.token='' --NotebookApp.password='' --notebook-dir=/home/${CI_KBASE_USERNAME}

  spark-connect-proxy:
    # image: ghcr.io/berdatalakehouse/spark_connect_proxy:main
    # platform: linux/amd64
    build:
      context: ../spark_connect_proxy
      dockerfile: Dockerfile
    ports:
      - "15004:15002"  # Proxy exposed on host port 15004
    environment:
      - KBASE_AUTH_URL=https://ci.kbase.us/services/auth/
      - PROXY_LISTEN_PORT=15002
      - BACKEND_PORT=15002
      - SERVICE_TEMPLATE=spark-notebook
      - TOKEN_CACHE_TTL=300
      - MFA_EXEMPT_USERS=${CI_KBASE_USERNAME}

  minio-manager-service:
    # image: ghcr.io/berdatalakehouse/minio_manager_service:main
    # platform: linux/amd64
    build:
      context: ../minio_manager_service
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    environment:
      - MINIO_ENDPOINT=http://ceph:8080
      - MINIO_ROOT_USER=test_access_key
      - MINIO_ROOT_PASSWORD=test_access_secret
      - KBASE_AUTH_URL=https://ci.kbase.us/services/auth/
      - KBASE_ADMIN_ROLES=CDM_JUPYTERHUB_ADMIN
      - KBASE_REQUIRED_ROLES=BERDL_USER
      - REDIS_URL=redis://redis:6379
      # Credential store (PostgreSQL)
      - MMS_DB_HOST=postgres
      - MMS_DB_PORT=5432
      - MMS_DB_NAME=mms
      - MMS_DB_USER=mms
      - MMS_DB_PASSWORD=mmspassword
      - MMS_DB_ENCRYPTION_KEY=change-me-in-prod
      - MMS_IAM_PATH_PREFIX=/data_governance_service
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      ceph:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  datalake-mcp-server:
    # image: ghcr.io/berdatalakehouse/datalake-mcp-server:main
    # platform: linux/amd64
    build:
      context: ../datalake-mcp-server
      dockerfile: Dockerfile
      args:
        BASE_TAG: local
        BASE_REGISTRY: ""
    ports:
      - "8005:8000"  # MCP server port
    environment:
      # Shared MCP service - connects to user-specific Spark Connect servers
      # For docker-compose local dev, we default to the primary notebook
      - SPARK_CONNECT_URL_TEMPLATE=sc://spark-notebook:15002
      - BERDL_HIVE_METASTORE_URI=thrift://hive-metastore:9083
      - MINIO_ENDPOINT_URL=ceph:8080
      # MinIO credentials fetched from MMS governance API per request
      - GOVERNANCE_API_URL=http://minio-manager-service:8000
      - KBASE_AUTH_URL=https://ci.kbase.us/services/auth/
      - KBASE_REQUIRED_ROLES=BERDL_USER
      - MFA_EXEMPT_USERS=${CI_KBASE_USERNAME}
      - BERDL_REDIS_HOST=redis
      - BERDL_REDIS_PORT=6379
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/apis/mcp/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      hive-metastore:
        condition: service_healthy
      ceph-create-buckets:
        condition: service_completed_successfully
      minio-manager-service:
        condition: service_healthy
      redis:
        condition: service_healthy

  tenant-access-request-service:
    # image: ghcr.io/berdatalakehouse/tenant_access_request_service:main
    # platform: linux/amd64
    build:
      context: ../tenant_access_request_service
      dockerfile: Dockerfile
    ports:
      - "8004:8000"
    environment:
      # Slack configuration (set in .env or leave empty for testing without Slack)
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - SLACK_CHANNEL_ID=${SLACK_CHANNEL_ID:-}

      # Governance API configuration
      - GOVERNANCE_API_URL=http://minio-manager-service:8000

      # KBase Auth configuration
      - KBASE_AUTH_URL=https://ci.kbase.us/services/auth/
      - KBASE_ADMIN_ROLES=CDM_JUPYTERHUB_ADMIN
      - KBASE_REQUIRED_ROLES=BERDL_USER

      - ROOT_PATH=/apis/tenant-request

      # Logging
      - LOG_LEVEL=DEBUG
    depends_on:
      minio-manager-service:
        condition: service_healthy

  spark-master:
    # image: ghcr.io/berdatalakehouse/kube_spark_manager_image:main
    # platform: linux/amd64
    build:
      context: ../kube_spark_manager_image
      dockerfile: Dockerfile
      args:
        BASE_TAG: local
        BASE_REGISTRY: ""
    ports:
      - "8090:8080"  # Spark Master Web UI
      - "7077:7077"  # Spark Master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/7077'"]
      interval: 30s
      timeout: 10s
      retries: 5

  spark-worker:
    # image: ghcr.io/berdatalakehouse/kube_spark_manager_image:main
    # platform: linux/amd64
    build:
      context: ../kube_spark_manager_image
      dockerfile: Dockerfile
      args:
        BASE_TAG: local
        BASE_REGISTRY: ""
    ports:
      - "8081:8081"  # Spark Worker Web UI
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_MEMORY=5g
      - SPARK_WORKER_PORT=8081
      - SPARK_WORKER_WEBUI_PORT=8081
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/8082'"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      - spark-master

  trino:
    # Trino coordinator — handles query planning, scheduling, and client connections.
    # Workers register with the coordinator via discovery.uri.
    # image: ghcr.io/berdatalakehouse/trino_access_control:main
    build:
      context: ../trino_access_control
      dockerfile: Dockerfile
      args:
        TRINO_VERSION: "479"
    ports:
      - "8082:8080"  # Trino Web UI / API
    volumes:
      - ./configs/trino/config.properties:/etc/trino/config.properties
      - ./configs/trino/access-control.properties:/etc/trino/access-control.properties
      - ./configs/trino/resource-groups.properties:/etc/trino/resource-groups.properties
      - ./configs/trino/resource-groups.json:/etc/trino/resource-groups.json
    depends_on:
      hive-metastore:
        condition: service_healthy
      ceph-create-buckets:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 5
    stop_grace_period: 150s

  trino-worker:
    # Trino worker — executes query fragments assigned by the coordinator.
    # Scale with: docker compose up -d --scale trino-worker=N
    # image: ghcr.io/berdatalakehouse/trino_access_control:main
    build:
      context: ../trino_access_control
      dockerfile: Dockerfile
      args:
        TRINO_VERSION: "479"
    volumes:
      - ./configs/trino/worker-config.properties:/etc/trino/config.properties
    depends_on:
      trino:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16.3
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hivepassword
      - POSTGRES_DB=hive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 5s
      timeout: 3s
      retries: 15
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres-readonly.sh:/docker-entrypoint-initdb.d/01-init-postgres-readonly.sh:ro
      - ./scripts/init-mms-db.sh:/docker-entrypoint-initdb.d/02-init-mms-db.sh:ro

  hive-metastore:
    # image: ghcr.io/berdatalakehouse/hive_metastore:main
    # platform: linux/amd64
    build:
      context: ../hive_metastore
      dockerfile: Dockerfile
      args:
        # IMPORTANT: Spark 4.0.0 is only officially compatible with Hive Metastore 4.0.0
        # Using newer Hive versions (4.1.0+) causes Thrift protocol incompatibilities
        HIVE_IMAGE_TAG: "4.0.0"
    ports:
      - "9083:9083"
    environment:
      # PostgreSQL database configuration
      - POSTGRES_DB=hive
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hivepassword
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

      # Ceph S3 configuration
      - S3_ENDPOINT=http://ceph:8080
      - S3_ACCESS_KEY=test_access_key
      - S3_SECRET_KEY=test_access_secret

      - DELTALAKE_WAREHOUSE_DIR=s3a://cdm-lake/users-sql-warehouse
    depends_on:
      postgres:
        condition: service_healthy
      ceph-create-buckets:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/9083'"]
      interval: 30s
      timeout: 10s
      retries: 3

  ceph:
    image: ghcr.io/kbasetest/ceph-rgw-test-image:0.1.3
    ports:
      - "9150:8080"  # Ceph RadosGW API
      - "8446:8443"  # Ceph Dashboard
    environment:
      RGW_PORT: "8080"
      RGW_ACCESS_KEY: test_access_key
      RGW_SECRET_KEY: test_access_secret
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  ceph-create-buckets:
    image: minio/mc
    depends_on:
      ceph:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Configuring Ceph...';
      mc alias set local http://ceph:8080 test_access_key test_access_secret;

      echo 'Creating buckets...';
      mc mb --ignore-existing local/cdm-lake;
      mc mb --ignore-existing local/cdm-spark-job-logs;

      echo 'Ceph bucket creation complete.';
      "

volumes:
  postgres_data:
  redis_data:
  global_share:
  users_home:  # Shared volume for all user home directories
